<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:    #2d5a3d;
  --green2:   #3a7050;
  --tan:      #f0ebe0;
  --border:   #d5cec4;
  --text:     #1e1a14;
  --muted:    #8a7d6a;
  --surface:  #faf7f2;
  --light-sq: #f0d9b5;
  --dark-sq:  #b58863;
  --hl:       rgba(255, 215, 0, 0.55);
  --radius:   8px;
  --shadow:   0 2px 12px rgba(30,20,10,0.10);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--tan);
  background-image: radial-gradient(circle at 65% 15%, rgba(45,90,61,0.06) 0%, transparent 55%);
  min-height: 100vh;
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: #fffdf8;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
header .title em { font-style: normal; color: var(--green); }

.turn-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}
.turn-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ccc;
  border: 2px solid transparent;
  transition: background 0.2s, border-color 0.2s;
}
.turn-dot.white { background: #f0f0f0; border-color: #aaa; }
.turn-dot.black { background: #222;    border-color: #555; }

/* ── Main layout ── */
main {
  flex: 1;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  padding: 24px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

/* ── Board column ── */
.board-col { display: flex; flex-direction: column; gap: 8px; align-items: center; }

/* ── Player bar ── */
.player-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  width: min(440px, calc(100vw - 48px));
  min-height: 26px;
}
.player-name { font-size: 13px; font-weight: 700; min-width: 46px; }
.player-captures { font-size: 15px; letter-spacing: 0.5px; flex: 1; }
.player-adv { font-size: 12px; font-weight: 700; color: var(--green); min-width: 28px; text-align: right; }

/* ── Chessboard ── */
.board-wrap { position: relative; user-select: none; }
.board {
  display: grid;
  grid-template-columns: 20px repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr) 20px;
  width: min(440px, calc(100vw - 48px));
  height: min(440px, calc(100vw - 48px));
  border: 2px solid #7a5c3b;
  border-radius: 3px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.sq {
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(18px, 4.5vw, 38px);
  cursor: pointer;
  transition: background 0.1s;
  line-height: 1;
}
.sq.light { background: var(--light-sq); }
.sq.dark  { background: var(--dark-sq); }
.sq.hl    { background: var(--hl) !important; }
.sq.selected { outline: 3px inset rgba(0,120,255,0.5); }
.sq.valid-target { position: relative; }
.sq.valid-target::after {
  content: '';
  position: absolute; inset: 30%;
  border-radius: 50%;
  background: rgba(0,0,0,0.18);
  pointer-events: none;
}
.sq.valid-target.occupied::after {
  inset: 0; border-radius: 0; background: none;
  border: 4px solid rgba(0,0,0,0.22);
}
.sq.in-check { background: #d9534f !important; }
.rank-label, .file-label {
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--muted);
  background: #c8a06e;
}
.rank-label { grid-column: 1; }
.file-label { grid-row: 9; }

/* ── Overlays ── */
#start-overlay {
  position: absolute; inset: 0;
  background: rgba(240,235,224,0.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 10; backdrop-filter: blur(2px);
}
#start-overlay p { font-size: 16px; font-weight: 600; color: var(--green); text-align: center; }

.thinking-overlay {
  position: absolute; inset: 0;
  background: rgba(240,235,224,0.65);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  z-index: 5; backdrop-filter: blur(1px);
}
.thinking-overlay span { font-size: 13px; font-weight: 600; color: var(--green); }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid rgba(45,90,61,0.2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Move input row ── */
.move-row {
  display: flex; gap: 8px;
  width: min(440px, calc(100vw - 48px));
}
.move-row input {
  flex: 1; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface);
  font-size: 15px; font-family: 'Courier New', monospace;
  outline: none; transition: border-color 0.15s;
}
.move-row input:focus { border-color: var(--green2); }
.move-row input::placeholder { color: var(--muted); }

/* ── Buttons ── */
button {
  padding: 8px 14px; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, opacity 0.15s;
}
button:disabled { opacity: 0.4; cursor: default; }
.btn-primary   { background: var(--green);  color: #fff; }
.btn-primary:hover:not(:disabled)   { background: var(--green2); }
.btn-secondary { background: #e8e0d4; color: var(--text); }
.btn-secondary:hover:not(:disabled) { background: var(--border); }
.btn-icon      { background: #e8e0d4; color: var(--text); padding: 8px 11px; }
.btn-icon:hover:not(:disabled)      { background: var(--border); }
.btn-danger    { background: #c0392b; color: #fff; }
.btn-danger:hover:not(:disabled)    { background: #a93226; }

/* ── Toolbar ── */
.toolbar {
  display: flex; gap: 8px; flex-wrap: wrap;
  width: min(440px, calc(100vw - 48px));
  align-items: center;
}
.toolbar select {
  padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface);
  font-size: 13px; font-weight: 600; color: var(--text);
  cursor: pointer; outline: none;
}

/* Auto AI toggle */
#btn-auto.active { background: var(--green); color: #fff; }
#btn-auto.active:hover:not(:disabled) { background: var(--green2); }

/* ── Right panel ── */
.panel-col { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 9px 14px;
  background: #fffdf8;
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--muted);
}
details.card > summary {
  padding: 9px 14px;
  background: #fffdf8;
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--muted);
  cursor: pointer; list-style: none;
  display: flex; align-items: center; justify-content: space-between;
}
details.card > summary::after  { content: '▼'; font-size: 9px; }
details.card[open] > summary::after { content: '▲'; }
details.card > summary::-webkit-details-marker { display: none; }

/* Status */
.status-card { padding: 12px 14px; }
#game-status { font-size: 14px; font-weight: 600; }
#game-status.check    { color: #c0392b; }
#game-status.gameover { color: var(--green); }
#game-status.normal   { color: var(--muted); }
#result-banner {
  display: none;
  margin-top: 8px; padding: 8px 12px;
  background: var(--green); color: #fff;
  font-weight: 700; font-size: 14px;
  border-radius: var(--radius); text-align: center;
}

/* Move history */
#move-list {
  padding: 10px 14px;
  font-size: 13px; line-height: 2;
  max-height: 220px; overflow-y: auto;
  color: var(--text);
}
.move-num  { color: var(--muted); margin-right: 3px; font-size: 12px; }
.move-san  { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 600; margin-right: 10px; }
.move-san.white { color: #1e3a25; }
.move-san.black { color: #5c3a1e; }
.move-san.current { background: rgba(45,90,61,0.13); border-radius: 3px; padding: 0 3px; }

/* API board */
#text-board {
  font-family: 'Courier New', 'Lucida Console', monospace;
  font-size: 13px; line-height: 1.7;
  padding: 12px 14px; white-space: pre;
  color: var(--text); overflow-x: auto;
}

/* ── Promotion modal ── */
#promo-modal {
  position: fixed; inset: 0;
  background: rgba(30,20,10,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
.promo-dialog {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(30,20,10,0.25);
  padding: 20px; text-align: center;
}
.promo-dialog p {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--muted); margin-bottom: 14px;
}
.promo-pieces { display: flex; gap: 8px; justify-content: center; }
.promo-btn {
  width: 58px; height: 58px; font-size: 34px;
  background: #e8e0d4; border: 2px solid transparent;
  border-radius: var(--radius); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.promo-btn:hover { background: var(--border); border-color: var(--green); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #c0392b; color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  z-index: 999; transition: transform 0.25s ease; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 700px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <span class="title">Rvigna <em>Chess</em></span>
  <div class="turn-indicator" id="turn-indicator">
    <div class="turn-dot" id="turn-dot"></div>
    <span id="turn-label"></span>
  </div>
</header>

<main>
  <!-- Left: board + controls -->
  <div class="board-col">

    <div class="player-bar">
      <span class="player-name" id="name-top">Black</span>
      <span class="player-captures" id="cap-top"></span>
      <span class="player-adv" id="adv-top"></span>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div id="start-overlay"><p>Click "New Game"<br>to start</p></div>
      <div class="thinking-overlay" id="thinking-overlay">
        <div class="spinner"></div>
        <span>Thinking…</span>
      </div>
    </div>

    <div class="player-bar">
      <span class="player-name" id="name-bot">White</span>
      <span class="player-captures" id="cap-bot"></span>
      <span class="player-adv" id="adv-bot"></span>
    </div>

    <div class="move-row">
      <input id="move-input" type="text" placeholder="e2e4  or  e7e8q" maxlength="5" autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="btn-move" onclick="submitMove()" disabled>Move</button>
    </div>

    <div class="toolbar">
      <button class="btn-primary" onclick="newGame()">New Game</button>
      <button class="btn-secondary" id="btn-ai" onclick="aiMove()" disabled>AI Move</button>
      <button class="btn-secondary" id="btn-auto" onclick="toggleAutoAI()" title="AI plays automatically after your move">Auto AI</button>
      <select id="difficulty" title="AI difficulty">
        <option value="1">Easy</option>
        <option value="2" selected>Normal</option>
        <option value="3">Hard</option>
      </select>
      <button class="btn-icon" onclick="flipBoard()" title="Flip board">⇅</button>
      <button class="btn-danger" id="btn-resign" onclick="handleResign()" disabled>Resign</button>
    </div>

  </div>

  <!-- Right: status + history + api board -->
  <div class="panel-col">

    <div class="card status-card">
      <div id="game-status" class="normal">No game started.</div>
      <div id="result-banner"></div>
    </div>

    <div class="card">
      <div class="card-head">Move History</div>
      <div id="move-list"><span style="color:var(--muted)">—</span></div>
    </div>

    <details class="card">
      <summary>API Board</summary>
      <pre id="text-board">—</pre>
    </details>

  </div>
</main>

<!-- Promotion modal -->
<div id="promo-modal" onclick="cancelPromo()">
  <div class="promo-dialog" onclick="event.stopPropagation()">
    <p>Promote pawn to</p>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

const API = (location.protocol === 'file:' || location.port !== '3001')
  ? 'http://localhost:3001'
  : '';

// ── State ────────────────────────────────────────────────────────────────────
let gameState    = null;
let selected     = null;
let validTargets = [];
let lastRender   = null;
let flipped      = false;
let thinking     = false;
let autoAI       = false;
let pendingPromo = null;  // { from, to } while promotion dialog is open

// ── Piece maps ───────────────────────────────────────────────────────────────
const PIECES = {
  k:'♔', q:'♕', r:'♖', b:'♗', n:'♘', p:'♙',  // white (lowercase in engine)
  K:'♚', Q:'♛', R:'♜', B:'♝', N:'♞', P:'♟',  // black (uppercase in engine)
};
const PIECE_VALS = { p:1, n:3, b:3, r:5, q:9 };

// ── Board construction ───────────────────────────────────────────────────────
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (let d = 0; d < 8; d++) {
    const r = flipped ? 7 - d : d;
    const rl = document.createElement('div');
    rl.className = 'rank-label';
    rl.textContent = 8 - r;
    rl.style.gridColumn = '1';
    rl.style.gridRow    = String(d + 1);
    board.appendChild(rl);

    for (let e = 0; e < 8; e++) {
      const c = flipped ? 7 - e : e;
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
      sq.dataset.r = r;
      sq.dataset.c = c;
      sq.style.gridColumn = String(e + 2);
      sq.style.gridRow    = String(d + 1);
      sq.addEventListener('click', () => onSquareClick(r, c));
      board.appendChild(sq);
    }
  }

  for (let e = 0; e < 8; e++) {
    const c = flipped ? 7 - e : e;
    const fl = document.createElement('div');
    fl.className = 'file-label';
    fl.textContent = String.fromCharCode(97 + c);
    fl.style.gridColumn = String(e + 2);
    fl.style.gridRow    = '9';
    board.appendChild(fl);
  }

  document.getElementById('name-top').textContent = flipped ? 'White' : 'Black';
  document.getElementById('name-bot').textContent = flipped ? 'Black' : 'White';
}

// ── Rendering ────────────────────────────────────────────────────────────────
function renderState(resp) {
  lastRender = resp;
  if (resp.state) gameState = resp.state;
  const s = resp.state;
  const checkSq = resp.inCheck && !s.gameOver ? findKing(s.boardState, s.turn) : null;

  document.querySelectorAll('.sq').forEach(el => {
    const r = +el.dataset.r, c = +el.dataset.c;
    const piece = s.boardState[r][c];
    el.className = 'sq ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
    el.textContent = piece ? (PIECES[piece] || piece) : '';

    if (s.lastMove) {
      const lm = s.lastMove;
      if ((r === lm.startR && c === lm.startC) || (r === lm.endR && c === lm.endC))
        el.classList.add('hl');
    }
    if (checkSq && r === checkSq.r && c === checkSq.c) el.classList.add('in-check');
    if (selected && r === selected.r && c === selected.c) el.classList.add('selected');
    const tgt = validTargets.find(t => t.row === r && t.col === c);
    if (tgt) { el.classList.add('valid-target'); if (tgt.occupied) el.classList.add('occupied'); }
  });

  document.getElementById('text-board').textContent = resp.board;
  renderMoveHistory(s.moveHistory.map(m => m.notation));
  renderPlayerBars(s.capturedPieces);

  // Turn indicator in header
  const ind = document.getElementById('turn-indicator');
  if (!s.gameOver) {
    ind.style.display = 'flex';
    document.getElementById('turn-dot').className = 'turn-dot ' + s.turn;
    document.getElementById('turn-label').textContent = cap(s.turn) + "'s turn";
  } else {
    ind.style.display = 'none';
  }

  // Status + result banner
  const statusEl = document.getElementById('game-status');
  const bannerEl = document.getElementById('result-banner');
  if (s.gameOver) {
    const labels = { '1-0': 'White wins', '0-1': 'Black wins', '1/2-1/2': 'Draw' };
    const resultText = labels[s.gameResult] || s.gameResult;
    statusEl.textContent = `Game over — ${resultText}`;
    statusEl.className = 'gameover';
    bannerEl.style.display = 'block';
    bannerEl.textContent = `${resultText}  ·  ${s.gameResult}`;
    setControls(false);
  } else if (resp.inCheck) {
    statusEl.textContent = `${cap(s.turn)} is in check!`;
    statusEl.className = 'check';
    bannerEl.style.display = 'none';
  } else {
    const moveNum = Math.ceil((s.moveHistory.length + 1) / 2);
    statusEl.textContent = `${cap(s.turn)}'s turn · move ${moveNum}`;
    statusEl.className = 'normal';
    bannerEl.style.display = 'none';
  }
}

function renderMoveHistory(history) {
  const el = document.getElementById('move-list');
  if (!history || !history.length) {
    el.innerHTML = '<span style="color:var(--muted)">—</span>';
    return;
  }
  const lastIdx = history.length - 1;
  let html = '';
  for (let i = 0; i < history.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    html += `<span class="move-num">${num}.</span>`;
    html += `<span class="move-san white${i === lastIdx ? ' current' : ''}">${history[i]}</span>`;
    if (i + 1 <= lastIdx) {
      html += `<span class="move-san black${i + 1 === lastIdx ? ' current' : ''}">${history[i + 1]}</span>`;
    }
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function renderPlayerBars(captured) {
  if (!captured) return;
  const wCapt = captured.white || [];  // captured BY white (opponent's black pieces)
  const bCapt = captured.black || [];  // captured BY black (opponent's white pieces)
  const val   = arr => arr.reduce((s, p) => s + (PIECE_VALS[p.toLowerCase()] || 0), 0);
  const wAdv  = val(wCapt) - val(bCapt);  // >0 = white ahead

  // When not flipped: black label on top, white on bottom
  const topCapt = flipped ? bCapt : wCapt;
  const botCapt = flipped ? wCapt : bCapt;
  const topAdv  = flipped ?  wAdv : -wAdv;
  const botAdv  = flipped ? -wAdv :  wAdv;

  document.getElementById('cap-top').textContent = topCapt.map(p => PIECES[p] || p).join('');
  document.getElementById('cap-bot').textContent = botCapt.map(p => PIECES[p] || p).join('');
  document.getElementById('adv-top').textContent = topAdv > 0 ? `+${topAdv}` : '';
  document.getElementById('adv-bot').textContent = botAdv > 0 ? `+${botAdv}` : '';
}

function findKing(board, color) {
  const king = color === 'white' ? 'k' : 'K';
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] === king) return { r, c };
  return null;
}

// ── Click-to-move ─────────────────────────────────────────────────────────────
function decodeMv(mv) {
  return {
    startC: mv.charCodeAt(0) - 97, startR: 8 - +mv[1],
    endC:   mv.charCodeAt(2) - 97, endR:   8 - +mv[3],
  };
}

async function onSquareClick(r, c) {
  if (!gameState || lastRender?.state?.gameOver || thinking) return;

  if (selected) {
    const isTarget = validTargets.find(t => t.row === r && t.col === c);
    if (isTarget) {
      const from  = toAlg(selected.r, selected.c);
      const to    = toAlg(r, c);
      const piece = lastRender.state.boardState[selected.r][selected.c];
      clearSelection();
      if (piece && piece.toLowerCase() === 'p' && (r === 0 || r === 7)) {
        showPromoDialog(from, to, piece);
        return;
      }
      await doMove(from + to);
      return;
    }
    clearSelection();
    // Check whether the newly clicked square has a piece we can re-select
    const newPiece = lastRender?.state?.boardState[r][c];
    const newColor = newPiece ? (newPiece === newPiece.toLowerCase() ? 'white' : 'black') : null;
    if (!newPiece || newColor !== lastRender.state.turn) {
      renderState(lastRender); // clear visual selection, nothing to re-select
      return;
    }
    // fall through to select the new piece
  }

  const piece = lastRender?.state?.boardState[r][c];
  if (!piece) return;
  const pieceColor = piece === piece.toLowerCase() ? 'white' : 'black';
  if (pieceColor !== lastRender.state.turn) return;

  selected = { r, c };
  validTargets = (lastRender.allValidMoves || [])
    .map(decodeMv)
    .filter(m => m.startR === r && m.startC === c)
    .map(m => ({ row: m.endR, col: m.endC, occupied: !!lastRender.state.boardState[m.endR][m.endC] }));
  renderState(lastRender);
}

function clearSelection() { selected = null; validTargets = []; }

// ── Promotion dialog ──────────────────────────────────────────────────────────
function showPromoDialog(from, to, pawn) {
  const isWhite = pawn === pawn.toLowerCase();
  const choices = isWhite
    ? [['q','♕'],['r','♖'],['b','♗'],['n','♘']]
    : [['q','♛'],['r','♜'],['b','♝'],['n','♞']];
  const container = document.getElementById('promo-pieces');
  container.innerHTML = '';
  choices.forEach(([code, sym]) => {
    const btn = document.createElement('button');
    btn.className = 'promo-btn';
    btn.textContent = sym;
    btn.onclick = () => { closePromoDialog(); doMove(from + to + code); };
    container.appendChild(btn);
  });
  pendingPromo = { from, to };
  document.getElementById('promo-modal').style.display = 'flex';
}
function closePromoDialog() {
  pendingPromo = null;
  document.getElementById('promo-modal').style.display = 'none';
}
function cancelPromo() { closePromoDialog(); }

// ── API calls ─────────────────────────────────────────────────────────────────
async function newGame() {
  clearSelection();
  closePromoDialog();
  const res = await apiFetch('POST', '/api/new');
  if (!res) return;
  document.getElementById('start-overlay').style.display = 'none';
  setControls(true);
  renderState(res);
}

async function doMove(moveStr) {
  if (thinking) return;
  thinking = true;
  const res = await apiFetch('POST', '/api/move', { state: gameState, move: moveStr });
  thinking = false;
  if (!res) return;
  renderState(res);
  document.getElementById('move-input').value = '';
  if (autoAI && !res.state.gameOver) {
    await aiMove();
  }
}

async function submitMove() {
  const val = document.getElementById('move-input').value.trim();
  if (!val) return;
  clearSelection();
  await doMove(val);
}

async function aiMove() {
  if (!gameState || thinking) return;
  clearSelection();
  const diff = parseInt(document.getElementById('difficulty').value, 10);
  setThinking(true);
  const res = await apiFetch('POST', '/api/ai-move', { state: gameState, difficulty: diff });
  setThinking(false);
  if (!res) return;
  renderState(res);
}

let _resignPending = false;
let _resignTimer   = null;

function handleResign() {
  if (!gameState || thinking) return;
  const btn = document.getElementById('btn-resign');
  if (!_resignPending) {
    _resignPending = true;
    btn.textContent = 'Confirm?';
    _resignTimer = setTimeout(() => resetResignBtn(), 3000);
    return;
  }
  clearTimeout(_resignTimer);
  resetResignBtn();
  resign();
}

function resetResignBtn() {
  _resignPending = false;
  const btn = document.getElementById('btn-resign');
  if (btn) btn.textContent = 'Resign';
}

async function resign() {
  if (!gameState) return;
  clearSelection();
  const res = await apiFetch('POST', '/api/resign', { state: gameState });
  if (!res) return;
  renderState(res);
}

async function apiFetch(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    const data = await r.json();
    if (!r.ok) { showToast(data.error || `Error ${r.status}`); return null; }
    return data;
  } catch {
    showToast('Cannot reach API — is chess-text-api.js running on port 3001?');
    return null;
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setControls(active) {
  ['btn-move', 'btn-ai', 'btn-resign'].forEach(id =>
    document.getElementById(id).disabled = !active
  );
  resetResignBtn();
}

function setThinking(on) {
  thinking = on;
  document.getElementById('thinking-overlay').style.display = on ? 'flex' : 'none';
  document.getElementById('btn-ai').disabled    = on;
  document.getElementById('btn-move').disabled  = on;
  document.getElementById('btn-resign').disabled = on;
}

function flipBoard() {
  flipped = !flipped;
  buildBoard();
  if (lastRender) renderState(lastRender);
}

function toggleAutoAI() {
  autoAI = !autoAI;
  document.getElementById('btn-auto').classList.toggle('active', autoAI);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function toAlg(r, c) { return String.fromCharCode(97 + c) + (8 - r); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Key bindings ──────────────────────────────────────────────────────────────
document.getElementById('move-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitMove();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
buildBoard();
</script>
</body>
